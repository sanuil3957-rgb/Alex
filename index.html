<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex | Чат по номеру телефона</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 550px; margin: 0 auto; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        .card {
            background: rgba(30, 27, 75, 0.95);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid rgba(140, 100, 220, 0.5);
            margin-bottom: 20px;
        }
        h1 { font-size: 32px; text-align: center; background: linear-gradient(135deg, #b794f4, #6b46c0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(20, 15, 55, 0.8);
            border: 1px solid #5a4a8a;
            border-radius: 28px;
            color: white;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            border: none;
            padding: 14px;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 20px;
            margin: 15px 0;
            font-size: 14px;
        }
        .online { background: rgba(16, 185, 129, 0.3); color: #10b981; }
        .offline { background: rgba(239, 68, 68, 0.3); color: #ef4444; }
        .waiting { background: rgba(245, 158, 11, 0.3); color: #f59e0b; }
        .messages {
            flex: 1;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
        }
        .message {
            padding: 10px 14px;
            margin: 8px 0;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .message.own {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            margin-left: auto;
        }
        .message.other {
            background: rgba(139, 92, 246, 0.3);
        }
        .message.system {
            background: rgba(16, 185, 129, 0.2);
            text-align: center;
            font-size: 12px;
            margin: 10px auto;
            max-width: 90%;
        }
        .input-row { display: flex; gap: 10px; margin-top: 10px; }
        .input-row input { flex: 1; margin: 0; }
        .input-row button { width: auto; padding: 14px 20px; margin: 0; }
        .user-list {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 10px;
            margin-top: 10px;
            font-size: 13px;
        }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .user-item:last-child { border-bottom: none; }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .select-user {
            background: rgba(139, 92, 246, 0.3);
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }
        .auth-screen { display: flex; flex-direction: column; height: 100vh; justify-content: center; }
        .chat-screen { display: none; flex-direction: column; height: 100vh; }
        .logout-btn {
            background: rgba(239, 68, 68, 0.3);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        small { color: #a19bcf; }
    </style>
</head>
<body>

<div class="container" id="authScreen">
    <div class="card">
        <h1>💜 Alex</h1>
        <p style="text-align:center; margin-bottom:20px;">Вход по номеру телефона</p>
        
        <input type="text" id="phoneInput" placeholder="📱 Номер телефона">
        <input type="text" id="nameInput" placeholder="👤 Ваше имя">
        <input type="password" id="passwordInput" placeholder="🔒 Пароль">
        
        <button id="loginBtn">Войти</button>
        <button id="registerBtn" style="background: rgba(139,92,246,0.5);">Зарегистрироваться</button>
        
        <div id="authError" style="color:#ef4444; text-align:center; margin-top:10px; font-size:12px;"></div>
        
        <p style="font-size:11px; color:#a19bcf; text-align:center; margin-top:20px;">
            📱 Введите номер, имя и пароль для регистрации
        </p>
    </div>
</div>

<div class="container" id="chatScreen">
    <div class="card">
        <div class="header-row">
            <div>
                <h1 style="font-size:24px;">💜 Alex</h1>
                <div id="myInfo" style="font-size:12px;"></div>
            </div>
            <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
        </div>
        
        <div id="status" class="status waiting">🟡 Поиск собеседников...</div>
        
        <div class="user-list" id="userList">
            <div style="text-align:center; padding:10px;">Загрузка...</div>
        </div>
        
        <div class="messages" id="messagesArea">
            <div class="message system">✨ Выберите собеседника из списка выше ✨</div>
        </div>
        
        <div class="input-row">
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button id="sendBtn">📤</button>
        </div>
    </div>
</div>

<script>
    let peer = null;
    let currentUser = null;
    let users = [];
    let connections = {};
    let activeChatWith = null;
    
    // Загрузка пользователей из localStorage
    function loadUsers() {
        const saved = localStorage.getItem('alex_users');
        if (saved) {
            users = JSON.parse(saved);
        } else {
            users = [];
        }
    }
    
    function saveUsers() {
        localStorage.setItem('alex_users', JSON.stringify(users));
    }
    
    // Регистрация
    function register() {
        const phone = document.getElementById('phoneInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        
        if (!phone || !name || !password) {
            document.getElementById('authError').innerText = 'Заполните все поля';
            return;
        }
        
        if (users.find(u => u.phone === phone)) {
            document.getElementById('authError').innerText = 'Этот номер уже зарегистрирован';
            return;
        }
        
        const newUser = {
            id: Date.now().toString(),
            phone: phone,
            name: name,
            password: password,
            avatar: '💜'
        };
        
        users.push(newUser);
        saveUsers();
        
        document.getElementById('authError').innerText = '✅ Регистрация успешна! Теперь войдите';
        document.getElementById('phoneInput').value = '';
        document.getElementById('passwordInput').value = '';
    }
    
    // Вход
    function login() {
        const phone = document.getElementById('phoneInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        
        const user = users.find(u => u.phone === phone && u.password === password);
        
        if (!user) {
            document.getElementById('authError').innerText = 'Неверный номер или пароль';
            return;
        }
        
        currentUser = user;
        localStorage.setItem('alex_current_user', JSON.stringify(currentUser));
        
        // Инициализируем PeerJS
        initPeer();
    }
    
    function initPeer() {
        peer = new Peer();
        
        peer.on('open', (id) => {
            currentUser.peerId = id;
            saveUsers();
            document.getElementById('myInfo').innerHTML = `📱 ${currentUser.phone} | 👤 ${currentUser.name}`;
            showChatScreen();
            updateStatus('🟢 Вы онлайн! Ожидайте собеседников', 'online');
            
            // Оповещаем всех о новом пользователе (через localStorage)
            broadcastUserList();
        });
        
        peer.on('connection', (conn) => {
            handleConnection(conn);
        });
        
        peer.on('error', (err) => {
            console.error('Peer error:', err);
            updateStatus('❌ Ошибка подключения. Обновите страницу', 'offline');
        });
    }
    
    function handleConnection(conn) {
        connections[conn.peer] = conn;
        
        conn.on('data', (data) => {
            if (data.type === 'message') {
                if (activeChatWith === conn.peer) {
                    addMessage(data.fromName, data.text, false);
                }
            }
        });
        
        conn.on('close', () => {
            delete connections[conn.peer];
            if (activeChatWith === conn.peer) {
                addSystemMessage('🔌 Собеседник отключился');
                activeChatWith = null;
            }
            renderUserList();
        });
        
        renderUserList();
        addSystemMessage(`🔗 ${conn.peer.substring(0, 8)} подключился`);
    }
    
    function connectToUser(peerId, userName) {
        if (connections[peerId]) {
            activeChatWith = peerId;
            addSystemMessage(`✅ Вы начали чат с ${userName}`);
            renderUserList();
            return;
        }
        
        const conn = peer.connect(peerId);
        
        conn.on('open', () => {
            connections[peerId] = conn;
            activeChatWith = peerId;
            addSystemMessage(`✅ Вы подключились к ${userName}`);
            renderUserList();
            
            conn.on('data', (data) => {
                if (data.type === 'message') {
                    if (activeChatWith === peerId) {
                        addMessage(data.fromName, data.text, false);
                    }
                }
            });
            
            conn.on('close', () => {
                delete connections[peerId];
                if (activeChatWith === peerId) {
                    addSystemMessage('🔌 Собеседник отключился');
                    activeChatWith = null;
                }
                renderUserList();
            });
        });
        
        conn.on('error', () => {
            addSystemMessage(`❌ Не удалось подключиться к ${userName}`);
        });
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text) return;
        if (!activeChatWith) {
            alert('Сначала выберите собеседника из списка');
            return;
        }
        
        const conn = connections[activeChatWith];
        if (!conn) {
            alert('Соединение потеряно');
            return;
        }
        
        conn.send({
            type: 'message',
            fromName: currentUser.name,
            text: text
        });
        
        addMessage(currentUser.name, text, true);
        input.value = '';
    }
    
    function addMessage(sender, text, isOwn) {
        const container = document.getElementById('messagesArea');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isOwn ? 'own' : 'other'}`;
        msgDiv.innerHTML = `<strong>${sender}:</strong> ${escapeHtml(text)}`;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    function addSystemMessage(text) {
        const container = document.getElementById('messagesArea');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message system';
        msgDiv.innerHTML = `💬 ${escapeHtml(text)}`;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    function renderUserList() {
        const container = document.getElementById('userList');
        const otherUsers = users.filter(u => u.id !== currentUser.id);
        
        if (otherUsers.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:10px;">😕 Нет других пользователей</div>';
            return;
        }
        
        container.innerHTML = otherUsers.map(user => {
            const isConnected = connections[user.peerId];
            const isActive = activeChatWith === user.peerId;
            return `
                <div class="user-item">
                    <div>
                        <span class="online-dot"></span>
                        <strong>${escapeHtml(user.name)}</strong><br>
                        <small>📱 ${user.phone}</small>
                    </div>
                    <button class="select-user" data-id="${user.peerId}" data-name="${user.name}">
                        ${isConnected ? (isActive ? '💬 Чат' : '✉️ Писать') : '🔗 Подключиться'}
                    </button>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.select-user').forEach(btn => {
            btn.onclick = () => {
                const peerId = btn.dataset.id;
                const userName = btn.dataset.name;
                if (connections[peerId]) {
                    activeChatWith = peerId;
                    addSystemMessage(`✅ Вы перешли в чат с ${userName}`);
                    renderUserList();
                } else {
                    connectToUser(peerId, userName);
                }
            };
        });
    }
    
    function broadcastUserList() {
        // Просто обновляем список
        setInterval(() => {
            if (currentUser && peer) {
                renderUserList();
            }
        }, 3000);
    }
    
    function updateStatus(text, type) {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = text;
        statusDiv.className = `status ${type}`;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }
    
    function showChatScreen() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('chatScreen').style.display = 'flex';
    }
    
    function logout() {
        if (peer) peer.destroy();
        localStorage.removeItem('alex_current_user');
        currentUser = null;
        connections = {};
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('chatScreen').style.display = 'none';
        document.getElementById('phoneInput').value = '';
        document.getElementById('passwordInput').value = '';
        document.getElementById('nameInput').value = '';
    }
    
    // Проверяем сохранённую сессию
    const savedUser = localStorage.getItem('alex_current_user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        initPeer();
    }
    
    // Обработчики
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('registerBtn').onclick = register;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    loadUsers();
</script>
</body>
</html>
