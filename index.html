<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alex | Мессенджер</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            color: #f0f0ff;
        }

        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: rgba(30, 27, 75, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(140, 100, 220, 0.5);
        }

        .auth-card h1 {
            font-size: 42px;
            text-align: center;
            background: linear-gradient(135deg, #b794f4, #6b46c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-card p {
            text-align: center;
            color: #c4b5fd;
            margin-bottom: 24px;
        }

        .auth-card input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            background: rgba(20, 15, 55, 0.8);
            border: 1px solid #5a4a8a;
            border-radius: 28px;
            color: white;
            font-size: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            border: none;
            padding: 14px;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }

        .btn-secondary {
            background: rgba(139, 92, 246, 0.5);
            border: none;
            padding: 14px;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #c4b5fd;
            cursor: pointer;
            font-size: 14px;
        }

        .error-text {
            color: #ef4444;
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
        }

        .app-container {
            display: none;
            height: 100vh;
        }

        .messenger {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: rgba(18, 14, 45, 0.97);
            backdrop-filter: blur(12px);
            border-right: 1px solid #3c2e6b;
            display: flex;
            flex-direction: column;
        }

        .profile-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #3c2e6b;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #9b6dff, #5a2dca);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-weight: bold;
            font-size: 18px;
        }

        .profile-phone {
            font-size: 11px;
            color: #b794f4;
        }

        .logout-btn {
            background: rgba(139, 92, 246, 0.3);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .search-section {
            padding: 16px;
            border-bottom: 1px solid #3c2e6b;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            background: #2a234a;
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 14px;
        }

        .search-box button {
            background: #7c3aed;
            border: none;
            padding: 0 16px;
            border-radius: 24px;
            color: white;
            cursor: pointer;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .user-item:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        .user-item.active {
            background: rgba(139, 92, 246, 0.4);
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            background: #3b2d6e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 500;
            font-size: 16px;
        }

        .user-phone {
            font-size: 11px;
            color: #a19bcf;
        }

        .online-badge {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 8, 30, 0.5);
        }

        .chat-header {
            padding: 16px 20px;
            background: rgba(30, 25, 70, 0.9);
            border-bottom: 1px solid #3c2e6b;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            background: #3b2d6e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: bold;
            font-size: 16px;
        }

        .chat-status {
            font-size: 11px;
            color: #b794f4;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.outgoing {
            align-self: flex-end;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 20px;
            background: #2d235a;
            color: #f0eaff;
            word-wrap: break-word;
            font-size: 15px;
        }

        .outgoing .bubble {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
        }

        .message-time {
            font-size: 10px;
            color: #9b8fcf;
            margin-top: 4px;
            margin-left: 8px;
        }

        .input-area {
            padding: 16px;
            background: rgba(30, 25, 70, 0.9);
            display: flex;
            gap: 12px;
            border-top: 1px solid #3c2e6b;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            background: #2a234a;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
        }

        .input-area button {
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .status-badge {
            padding: 8px 16px;
            text-align: center;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                width: 85%;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>💜 Alex</h1>
        <p>Мессенджер с номерами телефонов</p>
        
        <input type="text" id="authPhone" placeholder="📱 Номер телефона">
        <input type="text" id="authName" placeholder="👤 Ваше имя">
        <input type="password" id="authPassword" placeholder="🔒 Пароль">
        
        <button class="btn-primary" id="loginBtn">Войти</button>
        <button class="btn-secondary" id="registerBtn">Зарегистрироваться</button>
        
        <div id="authError" class="error-text"></div>
    </div>
</div>

<div id="appContainer" class="app-container">
    <div class="messenger">
        <div class="sidebar" id="sidebar">
            <div class="profile-header">
                <div class="profile-row">
                    <div class="avatar" id="myAvatar">💜</div>
                    <div class="profile-info">
                        <div class="profile-name" id="myName">Загрузка</div>
                        <div class="profile-phone" id="myPhone"></div>
                    </div>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>
            
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск по имени или номеру...">
                    <button id="searchBtn">Найти</button>
                </div>
            </div>
            
            <div style="padding: 12px 16px; font-size: 12px; color: #a19bcf;">
                👥 ВСЕ ПОЛЬЗОВАТЕЛИ
            </div>
            <div class="users-list" id="usersList">
                <div style="text-align:center; padding:20px;">Загрузка...</div>
            </div>
            <div class="status-badge" id="connectionStatus">🟡 Подключение...</div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-avatar" id="chatAvatar">💜</div>
                <div class="chat-info">
                    <div class="chat-name" id="chatName">Выберите чат</div>
                    <div class="chat-status" id="chatStatus"></div>
                </div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: #a78bfa; margin-top: 50px;">
                    ✨ Нажмите на пользователя слева, чтобы начать общение ✨
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    let peer = null;
    let currentUser = null;
    let allUsers = [];
    let connections = {};
    let activeChatPeerId = null;
    let activeChatName = null;
    
    // Загрузка пользователей из localStorage
    function loadUsers() {
        const saved = localStorage.getItem('alex_users');
        if (saved) {
            return JSON.parse(saved);
        }
        return [];
    }
    
    function saveUsers(users) {
        localStorage.setItem('alex_users', JSON.stringify(users));
        // Обновляем список у всех открытых вкладок
        window.dispatchEvent(new Event('storage'));
    }
    
    // Регистрация
    function register() {
        const phone = document.getElementById('authPhone').value.trim();
        const name = document.getElementById('authName').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        
        if (!phone || !name || !password) {
            document.getElementById('authError').innerText = '❌ Заполните все поля';
            return;
        }
        
        let users = loadUsers();
        
        if (users.find(u => u.phone === phone)) {
            document.getElementById('authError').innerText = '❌ Этот номер уже зарегистрирован';
            return;
        }
        
        const newUser = {
            id: Date.now().toString(),
            phone: phone,
            name: name,
            password: password,
            avatar: '💜',
            online: true
        };
        
        users.push(newUser);
        saveUsers(users);
        
        document.getElementById('authError').innerText = '✅ Регистрация успешна! Теперь войдите';
        document.getElementById('authPhone').value = '';
        document.getElementById('authPassword').value = '';
        document.getElementById('authName').value = '';
    }
    
    // Вход
    function login() {
        const phone = document.getElementById('authPhone').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        
        let users = loadUsers();
        const user = users.find(u => u.phone === phone && u.password === password);
        
        if (!user) {
            document.getElementById('authError').innerText = '❌ Неверный номер или пароль';
            return;
        }
        
        currentUser = user;
        localStorage.setItem('alex_current_user', JSON.stringify(currentUser));
        
        initPeer();
    }
    
    // Инициализация PeerJS
    function initPeer() {
        peer = new Peer();
        
        peer.on('open', (id) => {
            // Обновляем peerId текущего пользователя
            let users = loadUsers();
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex].peerId = id;
                users[userIndex].online = true;
                saveUsers(users);
            }
            currentUser.peerId = id;
            
            // Показываем интерфейс
            document.getElementById('myName').innerHTML = currentUser.name;
            document.getElementById('myPhone').innerHTML = `📱 ${currentUser.phone}`;
            document.getElementById('connectionStatus').innerHTML = '🟢 Онлайн';
            document.getElementById('connectionStatus').style.background = 'rgba(16,185,129,0.2)';
            
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            
            // Загружаем список пользователей
            refreshUsersList();
            
            // Обновляем список каждые 2 секунды
            setInterval(() => {
                if (currentUser) {
                    refreshUsersList();
                }
            }, 2000);
        });
        
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });
        
        peer.on('error', (err) => {
            console.error('Peer error:', err);
            document.getElementById('connectionStatus').innerHTML = '❌ Ошибка подключения';
        });
    }
    
    function setupConnection(conn) {
        connections[conn.peer] = conn;
        
        conn.on('data', (data) => {
            if (data.type === 'message') {
                if (activeChatPeerId === conn.peer) {
                    addMessage(data.fromName, data.text, false);
                } else {
                    // Показываем уведомление о новом сообщении
                    const user = allUsers.find(u => u.peerId === conn.peer);
                    if (user) {
                        addSystemMessage(`📩 Новое сообщение от ${user.name}`);
                    }
                }
            }
        });
        
        conn.on('close', () => {
            delete connections[conn.peer];
            if (activeChatPeerId === conn.peer) {
                addSystemMessage('🔌 Собеседник отключился');
                document.getElementById('chatStatus').innerHTML = '⚫ офлайн';
            }
        });
    }
    
    function connectToUser(peerId, userName) {
        if (connections[peerId]) {
            activeChatPeerId = peerId;
            activeChatName = userName;
            document.getElementById('chatName').innerHTML = userName;
            document.getElementById('chatStatus').innerHTML = '🟢 онлайн';
            document.getElementById('chatAvatar').innerHTML = '💜';
            addSystemMessage(`✅ Вы в чате с ${userName}`);
            return;
        }
        
        const conn = peer.connect(peerId);
        
        conn.on('open', () => {
            connections[peerId] = conn;
            activeChatPeerId = peerId;
            activeChatName = userName;
            document.getElementById('chatName').innerHTML = userName;
            document.getElementById('chatStatus').innerHTML = '🟢 онлайн';
            document.getElementById('chatAvatar').innerHTML = '💜';
            addSystemMessage(`✅ Вы подключились к ${userName}`);
            
            conn.on('data', (data) => {
                if (data.type === 'message') {
                    if (activeChatPeerId === peerId) {
                        addMessage(data.fromName, data.text, false);
                    }
                }
            });
            
            conn.on('close', () => {
                delete connections[peerId];
                if (activeChatPeerId === peerId) {
                    addSystemMessage('🔌 Собеседник отключился');
                    document.getElementById('chatStatus').innerHTML = '⚫ офлайн';
                }
            });
        });
        
        conn.on('error', () => {
            addSystemMessage(`❌ Не удалось подключиться к ${userName}`);
        });
    }
    
    function refreshUsersList() {
        let users = loadUsers();
        // Фильтруем текущего пользователя
        allUsers = users.filter(u => u.id !== currentUser?.id);
        renderUsersList();
    }
    
    function renderUsersList() {
        const container = document.getElementById('usersList');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = allUsers;
        if (searchTerm) {
            filtered = allUsers.filter(u => 
                u.name.toLowerCase().includes(searchTerm) || 
                u.phone.includes(searchTerm)
            );
        }
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#a19bcf; padding:20px;">😕 Нет пользователей<br><span style="font-size:12px;">Попросите друга зарегистрироваться!</span></div>';
            return;
        }
        
        container.innerHTML = filtered.map(user => {
            const isConnected = connections[user.peerId];
            const isActive = activeChatPeerId === user.peerId;
            return `
                <div class="user-item ${isActive ? 'active' : ''}" data-id="${user.peerId}" data-name="${user.name}">
                    <div class="user-avatar">${user.avatar || '💜'}</div>
                    <div class="user-info">
                        <div class="user-name">
                            ${escapeHtml(user.name)} 
                            ${user.online ? '<span class="online-badge"></span>' : ''}
                        </div>
                        <div class="user-phone">📱 ${user.phone}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.user-item').forEach(el => {
            el.onclick = () => {
                const peerId = el.dataset.id;
                const userName = el.dataset.name;
                connectToUser(peerId, userName);
                
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            };
        });
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text) return;
        if (!activeChatPeerId) {
            alert('Сначала выберите собеседника из списка слева');
            return;
        }
        
        const conn = connections[activeChatPeerId];
        if (!conn) {
            alert('Соединение потеряно. Попробуйте подключиться заново');
            return;
        }
        
        conn.send({
            type: 'message',
            fromName: currentUser.name,
            text: text
        });
        
        addMessage(currentUser.name, text, true);
        input.value = '';
    }
    
    function addMessage(sender, text, isOwn) {
        const container = document.getElementById('messagesArea');
        
        // Удаляем плейсхолдер если есть
        if (container.querySelector('.placeholder')) {
            container.innerHTML = '';
        }
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isOwn ? 'outgoing' : 'incoming'}`;
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        msgDiv.innerHTML = `
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="message-time">${time}</div>
        `;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    function addSystemMessage(text) {
        const container = document.getElementById('messagesArea');
        const msgDiv = document.createElement('div');
        msgDiv.style.textAlign = 'center';
        msgDiv.style.fontSize = '12px';
        msgDiv.style.color = '#a19bcf';
        msgDiv.style.margin = '10px 0';
        msgDiv.style.padding = '5px';
        msgDiv.innerHTML = `💬 ${escapeHtml(text)}`;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }
    
    function logout() {
        // Обновляем статус пользователя
        let users = loadUsers();
        const userIndex = users.findIndex(u => u.id === currentUser?.id);
        if (userIndex !== -1) {
            users[userIndex].online = false;
            saveUsers(users);
        }
        
        if (peer) peer.destroy();
        localStorage.removeItem('alex_current_user');
        currentUser = null;
        connections = {};
        allUsers = [];
        
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
        document.getElementById('authPhone').value = '';
        document.getElementById('authPassword').value = '';
        document.getElementById('authName').value = '';
        document.getElementById('messagesArea').innerHTML = '<div style="text-align: center; color: #a78bfa; margin-top: 50px;">✨ Нажмите на пользователя слева, чтобы начать общение ✨</div>';
    }
    
    function toggleSidebar() {
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.toggle('open');
        }
    }
    
    // Обработчики
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('registerBtn').onclick = register;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('searchBtn').onclick = () => renderUsersList();
    document.getElementById('searchInput').addEventListener('input', () => renderUsersList());
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    document.querySelector('.chat-header').onclick = toggleSidebar;
    
    // Проверка сохранённой сессии
    const savedUser = localStorage.getItem('alex_current_user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        initPeer();
    }
    
    // Синхронизация между вкладками
    window.addEventListener('storage', () => {
        if (currentUser) {
            refreshUsersList();
        }
    });
</script>
</body>
</html>
