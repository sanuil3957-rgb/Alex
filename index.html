<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alex | Поиск по нику</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #f0f0ff;
        }

        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: rgba(30, 27, 75, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(140, 100, 220, 0.5);
        }

        .auth-card h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #b794f4, #6b46c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-card input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            background: rgba(20, 15, 55, 0.8);
            border: 1px solid #5a4a8a;
            border-radius: 24px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .auth-card input:focus {
            border-color: #9b6dff;
            box-shadow: 0 0 0 2px rgba(155, 109, 255, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            border: none;
            padding: 12px 24px;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            transition: transform 0.1s;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #c4b5fd;
            cursor: pointer;
        }

        .app-container {
            display: none;
            height: 100vh;
        }

        .messenger {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: rgba(18, 14, 45, 0.95);
            backdrop-filter: blur(12px);
            border-right: 1px solid #3c2e6b;
            display: flex;
            flex-direction: column;
        }

        .profile-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #3c2e6b;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-lg {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #9b6dff, #5a2dca);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        .profile-status {
            font-size: 12px;
            color: #b794f4;
            cursor: pointer;
        }

        .logout-btn {
            background: rgba(139, 92, 246, 0.3);
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            color: #e9d5ff;
            cursor: pointer;
            font-size: 13px;
        }

        .search-section {
            padding: 16px;
            border-bottom: 1px solid #3c2e6b;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            background: #2a234a;
            border: none;
            border-radius: 24px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .search-box button {
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            border: none;
            padding: 8px 16px;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .search-results {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 8px;
            display: none;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .search-result-item:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        .search-result-avatar {
            width: 36px;
            height: 36px;
            background: #3b2d6e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .no-results {
            text-align: center;
            color: #a19bcf;
            padding: 12px;
            font-size: 13px;
        }

        .chats-title {
            padding: 12px 16px;
            font-size: 12px;
            color: #a19bcf;
            letter-spacing: 1px;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.1s;
            margin-bottom: 4px;
        }

        .user-item:hover, .user-item.active {
            background: rgba(139, 92, 246, 0.3);
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: #3b2d6e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .user-details {
            flex: 1;
        }

        .user-name-chat {
            font-weight: 500;
        }

        .last-msg {
            font-size: 12px;
            color: #a19bcf;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 8, 30, 0.5);
        }

        .chat-header {
            padding: 16px 20px;
            background: rgba(30, 25, 70, 0.8);
            border-bottom: 1px solid #3c2e6b;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .call-btn {
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.outgoing {
            align-self: flex-end;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 20px;
            background: #2d235a;
            color: #f0eaff;
            word-wrap: break-word;
        }

        .outgoing .bubble {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
        }

        .msg-time {
            font-size: 10px;
            color: #9b8fcf;
            margin-top: 4px;
            margin-left: 8px;
        }

        .input-area {
            padding: 16px;
            background: rgba(30, 25, 70, 0.8);
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            background: #2a234a;
            border: none;
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 15px;
        }

        .call-window {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .videos-container {
            position: relative;
            width: 90%;
            max-width: 1200px;
            height: 80%;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .remote-video-box {
            flex: 2;
            min-width: 300px;
            height: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .local-video-box {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #7c3aed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .call-controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(30, 27, 75, 0.95);
            padding: 16px 32px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            border: 1px solid #7c3aed;
            z-index: 2001;
        }

        .call-control-btn {
            background: #2d235a;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }

        .call-control-btn.mic-off { background: #ef4444; }
        .call-control-btn.video-off { background: #ef4444; }
        .call-control-btn.end-call { background: #ef4444; width: auto; border-radius: 40px; padding: 0 24px; font-size: 16px; }

        .call-info {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 2001;
        }

        .incoming-call-modal {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #1e1a4a, #2a235a);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #9b6dff;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 12px;
            min-width: 260px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); border-color: #ef4444; }
            100% { transform: scale(1); }
        }

        .profile-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1e1a4a, #2a235a);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid #9b6dff;
            z-index: 1500;
            display: none;
            flex-direction: column;
            gap: 16px;
            min-width: 320px;
        }

        .profile-modal input, .profile-modal select {
            padding: 12px;
            border-radius: 24px;
            background: #2a234a;
            border: 1px solid #5a4a8a;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .profile-modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .profile-modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .save-profile-btn { background: #10b981; color: white; }
        .cancel-profile-btn { background: #ef4444; color: white; }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1499;
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar { width: 280px; }
            .message { max-width: 85%; }
            .local-video-box { width: 120px; height: 90px; }
        }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>💜 Alex</h1>
        <p style="margin-bottom: 24px;">Поиск людей по нику</p>
        <input type="text" id="authUsername" placeholder="Имя пользователя">
        <input type="password" id="authPassword" placeholder="Пароль">
        <button class="btn-primary" id="authSubmitBtn">Войти</button>
        <div class="auth-toggle" id="authToggle">Нет аккаунта? Зарегистрироваться</div>
    </div>
</div>

<div id="appContainer" class="app-container">
    <div class="messenger">
        <div class="sidebar">
            <div class="profile-header">
                <div class="profile-row">
                    <div class="avatar-lg" id="myAvatar">👤</div>
                    <div class="profile-info">
                        <div class="profile-name" id="myUsername">Загрузка</div>
                        <div class="profile-status" id="myStatus">онлайн</div>
                    </div>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>
            
            <!-- ПОИСК ПО НИКУ -->
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchNickInput" placeholder="🔍 Поиск по нику...">
                    <button id="searchBtn">Найти</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div class="chats-title">💬 ЧАТЫ</div>
            <div class="users-list" id="usersList"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-user">
                    <div class="user-avatar" id="chatAvatar">👤</div>
                    <div>
                        <div id="chatUserName" style="font-weight: bold;">Выберите чат</div>
                        <div id="chatUserStatus" style="font-size: 12px; color: #b794f4;"></div>
                    </div>
                </div>
                <button class="call-btn" id="callBtn">📞 Видеозвонок</button>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: #a78bfa; margin-top: 50px;">✨ Выберите собеседника ✨</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                <button class="btn-primary" id="sendMsgBtn" style="width: auto; padding: 8px 24px;">➤</button>
            </div>
        </div>
    </div>
</div>

<div id="callWindow" class="call-window">
    <div class="call-info" id="callInfo">Соединение...</div>
    <div class="videos-container">
        <div class="remote-video-box"><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="local-video-box"><video id="localVideo" autoplay muted playsinline></video></div>
    </div>
    <div class="call-controls">
        <button class="call-control-btn" id="toggleMicBtn">🎤</button>
        <button class="call-control-btn" id="toggleVideoBtn">📹</button>
        <button class="call-control-btn end-call" id="endCallBtn">📞 Завершить</button>
    </div>
</div>

<div id="incomingCallModal" class="incoming-call-modal">
    <div id="callerName" style="font-weight: bold;">📞 Входящий звонок</div>
    <div class="call-buttons">
        <button class="call-btn-answer" id="acceptCallBtn" style="background:#10b981; border:none; padding:10px 20px; border-radius:30px; color:white; cursor:pointer;">Ответить</button>
        <button class="call-btn-reject" id="rejectCallBtn" style="background:#ef4444; border:none; padding:10px 20px; border-radius:30px; color:white; cursor:pointer;">Отклонить</button>
    </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="profileModal" class="profile-modal">
    <h3>✏️ Редактировать профиль</h3>
    <input type="text" id="editUsername" placeholder="Имя">
    <input type="text" id="editAvatar" placeholder="Аватар (эмодзи)">
    <select id="editStatus">
        <option value="онлайн">🟢 Онлайн</option>
        <option value="отошёл">⏰ Отошёл</option>
        <option value="не беспокоить">🔕 Не беспокоить</option>
    </select>
    <div class="profile-modal-buttons">
        <button class="save-profile-btn" id="saveProfileBtn">Сохранить</button>
        <button class="cancel-profile-btn" id="cancelProfileBtn">Отмена</button>
    </div>
</div>

<script>
    // ========== БАЗА ДАННЫХ ==========
    let users = [];
    let messages = [];
    
    function loadDatabase() {
        const storedUsers = localStorage.getItem('alex_users');
        const storedMessages = localStorage.getItem('alex_messages');
        
        if (storedUsers) {
            users = JSON.parse(storedUsers);
        } else {
            users = [
                { id: "1", username: "Анна", password: "123", avatar: "🌸", status: "онлайн", online: true },
                { id: "2", username: "Максим", password: "123", avatar: "💪", status: "онлайн", online: true },
                { id: "3", username: "Екатерина", password: "123", avatar: "🎨", status: "онлайн", online: true }
            ];
            saveDatabase();
        }
        
        if (storedMessages) {
            messages = JSON.parse(storedMessages);
        } else {
            messages = [];
        }
    }
    
    function saveDatabase() {
        localStorage.setItem('alex_users', JSON.stringify(users));
        localStorage.setItem('alex_messages', JSON.stringify(messages));
    }
    
    function registerUser(username, password) {
        if (users.find(u => u.username === username)) {
            return { success: false, error: 'Пользователь уже существует' };
        }
        const newUser = {
            id: Date.now().toString(),
            username: username,
            password: password,
            avatar: "💜",
            status: "онлайн",
            online: true
        };
        users.push(newUser);
        saveDatabase();
        return { success: true, user: newUser };
    }
    
    function loginUser(username, password) {
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            user.online = true;
            saveDatabase();
            return { success: true, user: { ...user } };
        }
        return { success: false, error: 'Неверные данные' };
    }
    
    function getUserById(id) {
        const user = users.find(u => u.id === id);
        return user ? { ...user } : null;
    }
    
    function getOtherUsers(currentId) {
        return users.filter(u => u.id !== currentId).map(u => ({
            id: u.id, username: u.username, avatar: u.avatar, status: u.status, online: u.online
        }));
    }
    
    function updateUser(userId, updates) {
        const index = users.findIndex(u => u.id === userId);
        if (index !== -1) {
            users[index] = { ...users[index], ...updates };
            saveDatabase();
        }
    }
    
    function addMessage(fromId, toId, text) {
        const msg = { id: Date.now(), from: fromId, to: toId, text: text, timestamp: Date.now() };
        messages.push(msg);
        saveDatabase();
        return msg;
    }
    
    function getMessagesBetween(user1, user2) {
        return messages.filter(m => 
            (m.from === user1 && m.to === user2) || (m.from === user2 && m.to === user1)
        ).sort((a,b) => a.timestamp - b.timestamp);
    }
    
    function getLastMessage(user1, user2) {
        const msgs = getMessagesBetween(user1, user2);
        return msgs[msgs.length - 1];
    }
    
    // ПОИСК ПОЛЬЗОВАТЕЛЕЙ ПО НИКУ
    function searchUsersByNick(query) {
        if (!query.trim()) return [];
        const lowerQuery = query.toLowerCase();
        return users.filter(u => 
            u.id !== currentUser.id && 
            u.username.toLowerCase().includes(lowerQuery)
        );
    }
    
    function renderSearchResults(query) {
        const container = document.getElementById('searchResults');
        const results = searchUsersByNick(query);
        
        if (results.length === 0 && query.trim()) {
            container.style.display = 'block';
            container.innerHTML = '<div class="no-results">👤 Пользователь не найден</div>';
            return;
        }
        
        if (query.trim() === '') {
            container.style.display = 'none';
            return;
        }
        
        container.style.display = 'block';
        container.innerHTML = results.map(user => `
            <div class="search-result-item" data-id="${user.id}">
                <div class="search-result-avatar">${user.avatar || "💜"}</div>
                <div>
                    <div style="font-weight: 500;">${escapeHtml(user.username)}</div>
                    <div style="font-size: 11px; color: #a19bcf;">${user.status || "онлайн"}</div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.search-result-item').forEach(el => {
            el.onclick = () => {
                const userId = el.dataset.id;
                activeChatUserId = userId;
                const user = getOtherUsers(currentUser.id).find(u => u.id === userId);
                if (user) {
                    document.getElementById('chatUserName').innerText = user.username;
                    document.getElementById('chatAvatar').innerHTML = user.avatar || "💜";
                    document.getElementById('chatUserStatus').innerHTML = user.online ? '🟢 онлайн' : '⚫ офлайн';
                }
                renderUsersList();
                renderMessages();
                document.getElementById('searchResults').style.display = 'none';
                document.getElementById('searchNickInput').value = '';
            };
        });
    }
    
    loadDatabase();
    
    // ========== ОСНОВНАЯ ЛОГИКА ==========
    let currentUser = null;
    let activeChatUserId = null;
    let peerConnection = null;
    let localStream = null;
    let callActive = false;
    let pendingCall = null;
    let ringtoneInterval = null;
    let isMicEnabled = true;
    let isVideoEnabled = true;
    
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    
    function playSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 440;
            gain.gain.value = 0.2;
            osc.start();
            setTimeout(() => { osc.stop(); ctx.close(); }, 400);
        } catch(e) {}
    }
    
    function renderUsersList() {
        const container = document.getElementById('usersList');
        if (!container || !currentUser) return;
        const others = getOtherUsers(currentUser.id);
        
        container.innerHTML = others.map(user => {
            const last = getLastMessage(currentUser.id, user.id);
            const lastText = last ? last.text.substring(0, 35) : "Нет сообщений";
            const active = activeChatUserId === user.id;
            return `
                <div class="user-item ${active ? 'active' : ''}" data-id="${user.id}">
                    <div class="user-avatar">${user.avatar || "💜"}</div>
                    <div class="user-details">
                        <div class="user-name-chat">${escapeHtml(user.username)} ${user.online ? '<span class="online-dot"></span>' : ''}</div>
                        <div class="last-msg">${escapeHtml(lastText)}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.user-item').forEach(el => {
            el.onclick = () => {
                activeChatUserId = el.dataset.id;
                const user = others.find(u => u.id === activeChatUserId);
                if (user) {
                    document.getElementById('chatUserName').innerText = user.username;
                    document.getElementById('chatAvatar').innerHTML = user.avatar || "💜";
                    document.getElementById('chatUserStatus').innerHTML = user.online ? '🟢 онлайн' : '⚫ офлайн';
                }
                renderUsersList();
                renderMessages();
            };
        });
    }
    
    function renderMessages() {
        const container = document.getElementById('messagesArea');
        if (!activeChatUserId) {
            container.innerHTML = '<div style="text-align:center; color:#a78bfa;">💬 Выберите чат</div>';
            return;
        }
        const msgs = getMessagesBetween(currentUser.id, activeChatUserId);
        if (msgs.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#a78bfa;">💬 Напишите первое сообщение</div>';
            return;
        }
        container.innerHTML = msgs.map(msg => {
            const isOut = msg.from === currentUser.id;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return `
                <div class="message ${isOut ? 'outgoing' : 'incoming'}">
                    <div class="bubble">${escapeHtml(msg.text)}</div>
                    <div class="msg-time">${time}</div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !activeChatUserId) return;
        addMessage(currentUser.id, activeChatUserId, text);
        input.value = '';
        renderMessages();
        renderUsersList();
    }
    
    async function startCall(isInitiator, targetId, targetName) {
        if (callActive) return;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
            peerConnection.onicecandidate = e => {
                if (e.candidate) localStorage.setItem(`call_${targetId}`, JSON.stringify({ type: 'ice', candidate: e.candidate, to: targetId }));
            };
            if (isInitiator) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                localStorage.setItem(`call_${targetId}`, JSON.stringify({ type: 'offer', offer, to: targetId, fromName: currentUser.username }));
                document.getElementById('callInfo').innerText = `Звоним ${targetName}...`;
            }
            callActive = true;
            document.getElementById('callWindow').style.display = 'flex';
            return true;
        } catch(e) { alert('Ошибка доступа к камере/микрофону'); return false; }
    }
    
    function checkCalls() {
        if (!currentUser) return;
        const data = localStorage.getItem(`call_${currentUser.id}`);
        if (data && !callActive) {
            const signal = JSON.parse(data);
            localStorage.removeItem(`call_${currentUser.id}`);
            if (signal.type === 'offer') {
                playSound();
                if (ringtoneInterval) clearInterval(ringtoneInterval);
                ringtoneInterval = setInterval(() => { if (document.getElementById('incomingCallModal').style.display === 'flex') playSound(); }, 2000);
                document.getElementById('callerName').innerHTML = `📞 Видеозвонок от ${signal.fromName}`;
                document.getElementById('incomingCallModal').style.display = 'flex';
                pendingCall = signal;
            } else if (signal.type === 'answer' && peerConnection) {
                peerConnection.setRemoteDescription(new RTCSessionDescription(signal.answer));
            } else if (signal.type === 'ice' && peerConnection) {
                peerConnection.addIceCandidate(new RTCIceCandidate(signal.candidate));
            }
        }
    }
    
    async function acceptCall() {
        if (!pendingCall) return;
        clearInterval(ringtoneInterval);
        document.getElementById('incomingCallModal').style.display = 'none';
        const target = getOtherUsers(currentUser.id).find(u => u.id === pendingCall.from);
        if (!target) return;
        await startCall(false, target.id, target.username);
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        localStorage.setItem(`call_${pendingCall.from}`, JSON.stringify({ type: 'answer', answer, to: pendingCall.from }));
        pendingCall = null;
    }
    
    function rejectCall() {
        clearInterval(ringtoneInterval);
        document.getElementById('incomingCallModal').style.display = 'none';
        pendingCall = null;
    }
    
    function endCall() {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peerConnection) peerConnection.close();
        callActive = false;
        document.getElementById('callWindow').style.display = 'none';
        document.getElementById('localVideo').srcObject = null;
        document.getElementById('remoteVideo').srcObject = null;
    }
    
    function toggleMic() {
        if (localStream) {
            const track = localStream.getAudioTracks()[0];
            if (track) { isMicEnabled = !isMicEnabled; track.enabled = isMicEnabled; }
            const btn = document.getElementById('toggleMicBtn');
            btn.textContent = isMicEnabled ? '🎤' : '🔇';
            btn.classList.toggle('mic-off', !isMicEnabled);
        }
    }
    
    function toggleVideo() {
        if (localStream) {
            const track = localStream.getVideoTracks()[0];
            if (track) { isVideoEnabled = !isVideoEnabled; track.enabled = isVideoEnabled; }
            const btn = document.getElementById('toggleVideoBtn');
            btn.textContent = isVideoEnabled ? '📹' : '🚫';
            btn.classList.toggle('video-off', !isVideoEnabled);
        }
    }
    
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) { 
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; 
        }); 
    }
    
    function openProfile() {
        document.getElementById('editUsername').value = currentUser.username;
        document.getElementById('editAvatar').value = currentUser.avatar || '💜';
        document.getElementById('editStatus').value = currentUser.status || 'онлайн';
        document.getElementById('profileModal').style.display = 'flex';
        document.getElementById('overlay').style.display = 'block';
    }
    
    function closeProfile() {
        document.getElementById('profileModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
    
    function saveProfile() {
        const newName = document.getElementById('editUsername').value.trim();
        const newAvatar = document.getElementById('editAvatar').value.trim();
        const newStatus = document.getElementById('editStatus').value;
        if (newName) {
            updateUser(currentUser.id, { username: newName, avatar: newAvatar, status: newStatus });
            currentUser = getUserById(currentUser.id);
            document.getElementById('myUsername').innerText = currentUser.username;
            document.getElementById('myAvatar').innerHTML = currentUser.avatar || "💜";
            document.getElementById('myStatus').innerText = currentUser.status;
            renderUsersList();
            if (activeChatUserId) renderMessages();
        }
        closeProfile();
    }
    
    function showApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('myUsername').innerText = currentUser.username;
        document.getElementById('myAvatar').innerHTML = currentUser.avatar || "💜";
        document.getElementById('myStatus').innerText = currentUser.status || "онлайн";
        renderUsersList();
        setInterval(() => { 
            if (currentUser) { 
                checkCalls(); 
                renderUsersList(); 
                if (activeChatUserId) renderMessages(); 
            } 
        }, 2000);
    }
    
    // Восстановление сессии
    const savedId = localStorage.getItem('alex_current_user');
    if (savedId) {
        const user = getUserById(savedId);
        if (user) { currentUser = user; showApp(); }
    }
    
    // Обработчики
    let isLogin = true;
    document.getElementById('authSubmitBtn').onclick = () => {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        if (isLogin) {
            const res = loginUser(username, password);
            if (res.success) {
                currentUser = res.user;
                localStorage.setItem('alex_current_user', currentUser.id);
                showApp();
            } else alert(res.error);
        } else {
            const res = registerUser(username, password);
            if (res.success) {
                alert('Регистрация успешна! Теперь войдите.');
                isLogin = true;
                document.getElementById('authSubmitBtn').innerText = 'Войти';
                document.getElementById('authToggle').innerText = 'Нет аккаунта? Зарегистрироваться';
                document.getElementById('authUsername').value = '';
                document.getElementById('authPassword').value = '';
            } else alert(res.error);
        }
    };
    
    document.getElementById('authToggle').onclick = () => {
        isLogin = !isLogin;
        document.getElementById('authSubmitBtn').innerText = isLogin ? 'Войти' : 'Зарегистрироваться';
        document.getElementById('authToggle').innerText = isLogin ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
    };
    
    document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem('alex_current_user');
        currentUser = null;
        activeChatUserId = null;
        if (callActive) endCall();
        document.getElementById('appContainer').style.display = 'none';
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('authUsername').value = '';
        document.getElementById('authPassword').value = '';
    };
    
    document.getElementById('sendMsgBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    document.getElementById('callBtn').onclick = () => {
        if (!activeChatUserId) alert('Выберите собеседника');
        else { const target = getOtherUsers(currentUser.id).find(u => u.id === activeChatUserId); if (target) startCall(true, target.id, target.username); }
    };
    document.getElementById('acceptCallBtn').onclick = acceptCall;
    document.getElementById('rejectCallBtn').onclick = rejectCall;
    document.getElementById('endCallBtn').onclick = endCall;
    document.getElementById('toggleMicBtn').onclick = toggleMic;
    document.getElementById('toggleVideoBtn').onclick = toggleVideo;
    
    document.getElementById('myUsername').onclick = openProfile;
    document.getElementById('myStatus').onclick = openProfile;
    document.getElementById('myAvatar').onclick = openProfile;
    document.getElementById('saveProfileBtn').onclick = saveProfile;
    document.getElementById('cancelProfileBtn').onclick = closeProfile;
    document.getElementById('overlay').onclick = closeProfile;
    
    // Поиск по нику
    document.getElementById('searchBtn').onclick = () => {
        const query = document.getElementById('searchNickInput').value;
        renderSearchResults(query);
    };
    document.getElementById('searchNickInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const query = document.getElementById('searchNickInput').value;
            renderSearchResults(query);
        }
    });
</script>
</body>
