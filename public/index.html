<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alex | Реальный мессенджер</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .auth-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-card {
            background: rgba(30, 27, 75, 0.95);
            border-radius: 32px;
            padding: 40px 24px;
            width: 100%;
            max-width: 340px;
            border: 1px solid rgba(140, 100, 220, 0.5);
        }
        .auth-card h1 { font-size: 42px; text-align: center; background: linear-gradient(135deg, #b794f4, #6b46c0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .auth-card input { width: 100%; padding: 14px; margin: 10px 0; background: rgba(20, 15, 55, 0.8); border: 1px solid #5a4a8a; border-radius: 28px; color: white; font-size: 16px; }
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #4c1d95); border: none; padding: 14px; border-radius: 28px; color: white; font-weight: bold; width: 100%; margin-top: 16px; cursor: pointer; }
        .auth-toggle { text-align: center; margin-top: 20px; color: #c4b5fd; cursor: pointer; }
        .app-container { display: none; height: 100vh; }
        .messenger { display: flex; height: 100vh; }
        .sidebar {
            width: 320px;
            background: rgba(18, 14, 45, 0.97);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3c2e6b;
            transition: transform 0.3s;
        }
        .chat-panel { flex: 1; display: flex; flex-direction: column; background: rgba(10, 8, 30, 0.7); }
        .profile-header { padding: 16px; background: rgba(0, 0, 0, 0.3); border-bottom: 1px solid #3c2e6b; }
        .profile-row { display: flex; align-items: center; gap: 12px; }
        .avatar-lg { width: 50px; height: 50px; background: linear-gradient(135deg, #9b6dff, #5a2dca); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .profile-info { flex: 1; }
        .profile-name { font-weight: bold; font-size: 18px; }
        .logout-btn { background: rgba(139, 92, 246, 0.3); border: none; padding: 8px 14px; border-radius: 20px; color: white; cursor: pointer; }
        .search-section { padding: 16px; border-bottom: 1px solid #3c2e6b; }
        .search-box { display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 12px; background: #2a234a; border: none; border-radius: 28px; color: white; }
        .search-box button { background: #7c3aed; border: none; padding: 0 20px; border-radius: 28px; color: white; cursor: pointer; }
        .search-results { max-height: 200px; overflow-y: auto; margin-top: 10px; display: none; background: rgba(0,0,0,0.3); border-radius: 16px; }
        .search-result-item { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; }
        .search-result-item:active { background: rgba(139,92,246,0.4); }
        .chats-title { padding: 12px 16px; font-size: 12px; color: #a19bcf; }
        .users-list { flex: 1; overflow-y: auto; padding: 8px; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px; cursor: pointer; margin-bottom: 4px; }
        .user-item:hover, .user-item.active { background: rgba(139, 92, 246, 0.3); }
        .user-avatar { width: 48px; height: 48px; background: #3b2d6e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .user-details { flex: 1; }
        .user-name-chat { font-weight: 500; font-size: 16px; }
        .online-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-left: 6px; }
        .chat-header { padding: 12px 16px; background: rgba(30, 25, 70, 0.9); border-bottom: 1px solid #3c2e6b; display: flex; align-items: center; gap: 12px; }
        .back-btn { background: none; border: none; font-size: 28px; color: white; cursor: pointer; display: none; width: 40px; height: 40px; border-radius: 50%; }
        .chat-user-info { flex: 1; display: flex; align-items: center; gap: 12px; }
        .call-btn { background: linear-gradient(135deg, #7c3aed, #4c1d95); border: none; padding: 8px 18px; border-radius: 30px; color: white; cursor: pointer; }
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 80%; display: flex; flex-direction: column; }
        .message.outgoing { align-self: flex-end; }
        .message.incoming { align-self: flex-start; }
        .bubble { padding: 10px 16px; border-radius: 20px; background: #2d235a; word-wrap: break-word; }
        .outgoing .bubble { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
        .msg-time { font-size: 10px; color: #9b8fcf; margin-top: 4px; margin-left: 8px; }
        .input-area { padding: 12px 16px; background: rgba(30, 25, 70, 0.9); display: flex; gap: 10px; border-top: 1px solid #3c2e6b; }
        .input-area input { flex: 1; padding: 12px 18px; background: #2a234a; border: none; border-radius: 30px; color: white; font-size: 16px; }
        .call-window {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .videos-container { position: relative; width: 95%; max-width: 1000px; height: 70%; }
        .remote-video-box { width: 100%; height: 100%; background: #000; border-radius: 20px; overflow: hidden; }
        .local-video-box { position: absolute; bottom: 16px; right: 16px; width: 120px; height: 160px; background: #1a1a2e; border-radius: 12px; overflow: hidden; border: 2px solid #7c3aed; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .call-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(30, 27, 75, 0.95);
            padding: 12px 24px;
            border-radius: 50px;
        }
        .call-control-btn { background: #2d235a; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 22px; cursor: pointer; color: white; }
        .call-control-btn.end-call { background: #ef4444; width: auto; border-radius: 40px; padding: 0 20px; font-size: 14px; }
        .incoming-call-modal {
            position: fixed;
            bottom: 30px;
            right: 20px;
            left: 20px;
            background: linear-gradient(135deg, #1e1a4a, #2a235a);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #9b6dff;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 12px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); border-color: #ef4444; } }
        .call-buttons { display: flex; gap: 12px; }
        .call-btn-answer { background: #10b981; border: none; padding: 10px; border-radius: 30px; color: white; flex: 1; cursor: pointer; }
        .call-btn-reject { background: #ef4444; border: none; padding: 10px; border-radius: 30px; color: white; flex: 1; cursor: pointer; }
        .total-users { padding: 12px; font-size: 11px; color: #6c6c70; text-align: center; border-top: 1px solid #3c2e6b; }
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: 0; top: 0; height: 100%; width: 85%; max-width: 300px; z-index: 100; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .back-btn { display: flex; }
            .message { max-width: 85%; }
        }
        @media (min-width: 769px) { .back-btn { display: none; } }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1>💜 Alex</h1>
        <p style="text-align:center;">Реальное общение</p>
        <input type="text" id="authUsername" placeholder="Имя пользователя">
        <input type="password" id="authPassword" placeholder="Пароль">
        <button class="btn-primary" id="authSubmitBtn">Войти</button>
        <div class="auth-toggle" id="authToggle">Нет аккаунта? Зарегистрироваться</div>
    </div>
</div>

<div id="appContainer" class="app-container">
    <div class="messenger">
        <div class="sidebar" id="sidebar">
            <div class="profile-header">
                <div class="profile-row">
                    <div class="avatar-lg" id="myAvatar">👤</div>
                    <div class="profile-info">
                        <div class="profile-name" id="myUsername">Загрузка</div>
                    </div>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск...">
                    <button id="searchBtn">Найти</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="chats-title">💬 ПОЛЬЗОВАТЕЛИ ОНЛАЙН</div>
            <div class="users-list" id="usersList"></div>
            <div class="total-users" id="totalUsers"></div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">
                <button class="back-btn" id="backBtn">←</button>
                <div class="chat-user-info">
                    <div class="user-avatar" id="chatAvatar" style="width:44px;height:44px;">👤</div>
                    <div>
                        <div id="chatUserName" style="font-weight: bold;">Выберите чат</div>
                        <div id="chatUserStatus" style="font-size: 11px; color:#b794f4;"></div>
                    </div>
                </div>
                <button class="call-btn" id="callBtn">📞</button>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align:center; color:#a78bfa;">✨ Выберите собеседника ✨</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button class="btn-primary" id="sendMsgBtn" style="width:auto; padding:8px 20px;">➤</button>
            </div>
        </div>
    </div>
</div>

<div id="callWindow" class="call-window">
    <div class="call-info" id="callInfo">Соединение...</div>
    <div class="videos-container">
        <div class="remote-video-box"><video id="remoteVideo" autoplay playsinline></video></div>
        <div class="local-video-box"><video id="localVideo" autoplay muted playsinline></video></div>
    </div>
    <div class="call-controls">
        <button class="call-control-btn" id="toggleMicBtn">🎤</button>
        <button class="call-control-btn" id="toggleVideoBtn">📹</button>
        <button class="call-control-btn end-call" id="endCallBtn">📞 Завершить</button>
    </div>
</div>

<div id="incomingCallModal" class="incoming-call-modal">
    <div id="callerName" style="font-weight: bold;">📞 Входящий звонок</div>
    <div class="call-buttons">
        <button class="call-btn-answer" id="acceptCallBtn">Ответить</button>
        <button class="call-btn-reject" id="rejectCallBtn">Отклонить</button>
    </div>
</div>

<script>
    let socket = null;
    let currentUser = null;
    let activeChatUser = null;
    let usersList = [];
    let localStream = null;
    let peerConnection = null;
    let callActive = false;
    let pendingCall = null;
    
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    
    function connectSocket() {
        socket = io();
        
        socket.on('register_success', (data) => {
            currentUser = { id: data.id, username: data.username };
            localStorage.setItem('alex_user', JSON.stringify(currentUser));
            showApp();
        });
        socket.on('register_error', (msg) => alert(msg));
        socket.on('login_success', (user) => {
            currentUser = user;
            localStorage.setItem('alex_user', JSON.stringify({ id: user.id, username: user.username }));
            showApp();
        });
        socket.on('login_error', (msg) => alert(msg));
        
        socket.on('users_update', (users) => {
            usersList = users;
            renderUsersList();
            const onlineCount = users.filter(u => u.online).length;
            document.getElementById('totalUsers').innerHTML = `🟢 Онлайн: ${onlineCount} | 👥 Всего: ${users.length}`;
        });
        
        socket.on('users_list', (users) => {
            usersList = users;
            renderUsersList();
        });
        
        socket.on('messages_history', (msgs) => {
            renderMessages(msgs);
        });
        
        socket.on('new_message', (msg) => {
            if (activeChatUser && (msg.from === activeChatUser.id || msg.to === activeChatUser.id)) {
                socket.emit('get_messages', activeChatUser.id);
            }
            renderUsersList();
        });
        
        socket.on('incoming_call', async (data) => {
            document.getElementById('callerName').innerHTML = `📞 Звонок от ${data.fromName}`;
            document.getElementById('incomingCallModal').style.display = 'flex';
            pendingCall = data;
        });
        
        socket.on('call_accepted', async (data) => {
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
            }
        });
        
        socket.on('call_rejected', () => {
            alert('Звонок отклонён');
            endCall();
        });
    }
    
    function register() {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        if (!username || !password) return alert('Заполните все поля');
        connectSocket();
        socket.emit('register', { username, password, avatar: '💜' });
    }
    
    function login() {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value.trim();
        if (!username || !password) return alert('Заполните все поля');
        connectSocket();
        socket.emit('login', { username, password });
    }
    
    function renderUsersList() {
        const container = document.getElementById('usersList');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filtered = usersList.filter(u => u.username.toLowerCase().includes(searchTerm));
        
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#a19bcf; padding:20px;">😕 Нет пользователей</div>';
            return;
        }
        
        container.innerHTML = filtered.map(user => `
            <div class="user-item ${activeChatUser?.id === user.id ? 'active' : ''}" data-id="${user.id}">
                <div class="user-avatar">${user.avatar || '💜'}</div>
                <div class="user-details">
                    <div class="user-name-chat">${escapeHtml(user.username)} ${user.online ? '<span class="online-dot"></span>' : ''}</div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.user-item').forEach(el => {
            el.onclick = () => {
                const userId = el.dataset.id;
                activeChatUser = usersList.find(u => u.id === userId);
                if (activeChatUser) {
                    document.getElementById('chatUserName').innerHTML = activeChatUser.username;
                    document.getElementById('chatAvatar').innerHTML = activeChatUser.avatar || '💜';
                    document.getElementById('chatUserStatus').innerHTML = activeChatUser.online ? '🟢 онлайн' : '⚫ офлайн';
                    socket.emit('get_messages', activeChatUser.id);
                }
                renderUsersList();
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            };
        });
    }
    
    function renderMessages(msgs) {
        const container = document.getElementById('messagesArea');
        if (!msgs || msgs.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#a78bfa;">💬 Напишите первое сообщение</div>';
            return;
        }
        container.innerHTML = msgs.map(msg => {
            const isOut = msg.from === currentUser.id;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return `
                <div class="message ${isOut ? 'outgoing' : 'incoming'}">
                    <div class="bubble">${escapeHtml(msg.text)}</div>
                    <div class="msg-time">${time}</div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const text = document.getElementById('messageInput').value.trim();
        if (!text || !activeChatUser) return;
        socket.emit('send_message', { to: activeChatUser.id, text });
        document.getElementById('messageInput').value = '';
        setTimeout(() => socket.emit('get_messages', activeChatUser.id), 100);
    }
    
    async function makeCall() {
        if (!activeChatUser) return alert('Выберите собеседника');
        callActive = true;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            document.getElementById('callWindow').style.display = 'flex';
            
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('call_user', { to: activeChatUser.id, fromName: currentUser.username, signal: event.candidate });
                }
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('call_user', { to: activeChatUser.id, fromName: currentUser.username, signal: offer });
        } catch(e) { alert('Ошибка доступа к камере'); endCall(); }
    }
    
    async function acceptCall() {
        if (!pendingCall) return;
        document.getElementById('incomingCallModal').style.display = 'none';
        callActive = true;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            document.getElementById('callWindow').style.display = 'flex';
            
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('accept_call', { to: pendingCall.from, signal: event.candidate });
                }
            };
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(pendingCall.signal));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('accept_call', { to: pendingCall.from, signal: answer });
            pendingCall = null;
        } catch(e) { alert('Ошибка'); endCall(); }
    }
    
    function rejectCall() {
        if (pendingCall) socket.emit('reject_call', { to: pendingCall.from });
        document.getElementById('incomingCallModal').style.display = 'none';
        pendingCall = null;
    }
    
    function endCall() {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peerConnection) peerConnection.close();
        callActive = false;
        document.getElementById('callWindow').style.display = 'none';
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    
    function showApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('myUsername').innerHTML = currentUser.username;
        document.getElementById('myAvatar').innerHTML = currentUser.avatar || '💜';
        socket.emit('get_users');
        setInterval(() => { if (activeChatUser) socket.emit('get_messages', activeChatUser.id); }, 2000);
    }
    
    function logout() { localStorage.removeItem('alex_user'); location.reload(); }
    
    const savedUser = localStorage.getItem('alex_user');
    if (savedUser) {
        const user = JSON.parse(savedUser);
        connectSocket();
        socket.on('connect', () => socket.emit('login', { username: user.username, password: '' }));
    }
    
    let isLogin = true;
    document.getElementById('authSubmitBtn').onclick = () => isLogin ? login() : register();
    document.getElementById('authToggle').onclick = () => {
        isLogin = !isLogin;
        document.getElementById('authSubmitBtn').innerText = isLogin ? 'Войти' : 'Зарегистрироваться';
        document.getElementById('authToggle').innerText = isLogin ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
    };
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('sendMsgBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    document.getElementById('callBtn').onclick = makeCall;
    document.getElementById('acceptCallBtn').onclick = acceptCall;
    document.getElementById('rejectCallBtn').onclick = rejectCall;
    document.getElementById('endCallBtn').onclick = endCall;
    document.getElementById('backBtn').onclick = () => document.getElementById('sidebar').classList.add('open');
    document.getElementById('searchBtn').onclick = () => renderUsersList();
    document.getElementById('searchInput').addEventListener('input', () => renderUsersList());
    
    let mic = true, vid = true;
    document.getElementById('toggleMicBtn').onclick = () => {
        if (localStream) { mic = !mic; localStream.getAudioTracks()[0].enabled = mic; document.getElementById('toggleMicBtn').textContent = mic ? '🎤' : '🔇'; }
    };
    document.getElementById('toggleVideoBtn').onclick = () => {
        if (localStream) { vid = !vid; localStream.getVideoTracks()[0].enabled = vid; document.getElementById('toggleVideoBtn').textContent = vid ? '📹' : '🚫'; }
    };
</script>
</body>
</html>
